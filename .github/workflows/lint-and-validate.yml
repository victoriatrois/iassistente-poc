name: Lint & Validate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Validate branch name
        run: node scripts/validate-branch.js
        env:
          BRANCH_NAME: ${{ github.head_ref }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Prettier Check
        run: npm run lint:prettier:check
        continue-on-error: false

      - name: ESLint Check
        run: npm run lint:eslint:check
        continue-on-error: false

      - name: SecretLint Check
        run: npm run lint:secretlint:check
        continue-on-error: false

      - name: Lint Summary
        if: failure()
        run: |
          echo "❌ Linting failed!"
          echo ""
          echo "Run these commands locally to fix issues:"
          echo "  npm run lint:prettier:fix     # Fix formatting"
          echo "  npm run lint:eslint:check     # Check ESLint"
          echo "  npm run lint:secretlint:check # Check secrets"
