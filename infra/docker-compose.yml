version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: iassistente-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_user -d notes_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iassistente-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: iassistente-backend
    environment:
      DATABASE_URL: ${POSTGRES_DB}
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - /app/node_modules
    networks:
      - iassistente-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  iassistente-network:
    driver: bridge
